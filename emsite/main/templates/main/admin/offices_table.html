<div class="admin-table-wrapper"

     data-type="offices"

     data-edit-url="/admin/edit-office/"

     data-delete-url="/admin/delete-offices/">

    <table class="admin-table">

        <thead>

        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Адрес</th>
            <th>С</th>
            <th>До</th>
        </tr>

        </thead>

        <tbody>

        {% for office in offices %}

        <tr data-id="{{ office.id }}">

            <td>{{ office.id }}</td>

            <td>{{ office.name }}</td>

            <td>{{ office.address }}</td>

            <td>{{ office.time_work_from }}</td>

            <td>{{ office.time_work_to }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>


    <!-- КНОПКИ -->

    <div class="admin-actions">

        <a href="{% url 'main:admin_create_office' %}"
           class="admin-add-btn">

            <i class="fa-solid fa-plus"></i>

            Добавить

        </a>

        <button class="admin-edit-btn">

            <i class="fa-solid fa-pen"></i>

            Редактировать

        </button>

        <button class="admin-delete-btn">

            <i class="fa-solid fa-trash"></i>

            Удалить

        </button>

    </div>

</div>
